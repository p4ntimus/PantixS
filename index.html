<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PantixS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Username Overlay -->
  <div id="username-overlay">
    <div class="overlay-box">
      <h2>Wie heißt du?</h2>
      <input id="usernameInput" type="text" placeholder="Dein Name">
      <button id="saveUsernameBtn">Weiter</button>
    </div>
  </div>

  <!-- Header -->
  <header id="chat-header">
    <span id="chat-username">PantixS</span>
  </header>

  <!-- Nachrichten -->
  <div id="messages"></div>

  <!-- Eingabe -->
  <div id="inputArea">
    <textarea id="messageInput" placeholder="Nachricht schreiben..."></textarea>
    <button id="sendBtn">➤</button>
  </div>

  <script type="module" src="chat.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PantixS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Username Overlay -->
  <div id="username-overlay">
    <div class="overlay-box">
      <h2>Wie heißt du?</h2>
      <input id="usernameInput" type="text" placeholder="Dein Name">
      <button id="saveUsernameBtn">Weiter</button>
    </div>
  </div>

  <!-- Header -->
  <header id="chat-header" class="chat-header">
    <div class="header-left">
        <div class="header-emoji">🦋</div>

        <div class="header-titles">
            <div class="header-title">PantixS</div>
            <div class="header-subtitle">
                <span class="online-dot"></span> Online
            </div>
        </div>
    </div>

    <div class="header-right">
        <span class="header-icon">⭐</span>
        <span class="header-icon">🔍</span>
        <span class="header-icon settings-icon">⚙️</span>
    </div>
</header>

  <!-- Nachrichten -->
  <div id="messages"></div>

  <!-- Eingabe -->
  <div id="inputArea">
    <textarea id="messageInput" placeholder="Nachricht schreiben..."></textarea>
    <button id="sendBtn">➤</button>
  </div>

  <script type="module" src="chat.js"></script>
</body>
</html>
